        const video = document.getElementById('video-player');
        let hls; 
        let currentChannelId = null;
        let activeCategory = 'Tümü';
        let searchQuery = '';
        let favorites = JSON.parse(localStorage.getItem('mugolFavorites')) ||[];

        // --- TEMA & SAAT ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        function updateThemeUI() {
            if (document.documentElement.classList.contains('dark')) {
                darkIcon.classList.add('hidden'); lightIcon.classList.remove('hidden');
                localStorage.setItem('mugolTheme', 'dark');
            } else {
                lightIcon.classList.add('hidden'); darkIcon.classList.remove('hidden');
                localStorage.setItem('mugolTheme', 'light');
            }
        }

        if (localStorage.getItem('mugolTheme') === 'light') document.documentElement.classList.remove('dark');
        updateThemeUI();
        themeToggleBtn.addEventListener('click', () => { document.documentElement.classList.toggle('dark'); updateThemeUI(); });

        setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('tr-TR'); }, 1000);

        // --- SOL MENÜ ---
        const leftDrawer = document.getElementById('left-drawer');
        const drawerBackdrop = document.getElementById('drawer-backdrop');

        function toggleMenu() {
            if (leftDrawer.classList.contains('-translate-x-full')) {
                leftDrawer.classList.remove('-translate-x-full'); drawerBackdrop.classList.remove('hidden');
            } else {
                leftDrawer.classList.add('-translate-x-full'); drawerBackdrop.classList.add('hidden');
            }
        }
        document.getElementById('menu-btn').addEventListener('click', toggleMenu);
        document.getElementById('close-menu-btn').addEventListener('click', toggleMenu);
        drawerBackdrop.addEventListener('click', toggleMenu);

        function initCategories() {
            const categories =['Tümü', ...new Set(channels.map(c => c.category))];
            const catList = document.getElementById('category-list');
            categories.forEach(cat => {
                const li = document.createElement('li');
                li.innerHTML = `<button onclick="filterCategory('${cat}')" class="w-full text-left px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition font-bold cat-btn" data-cat="${cat}">${cat}</button>`;
                catList.appendChild(li);
            });
            updateActiveCategoryUI();
        }

        function filterCategory(cat) {
            activeCategory = cat;
            updateActiveCategoryUI(); renderChannels(); toggleMenu(); 
        }

        function updateActiveCategoryUI() {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                if(btn.dataset.cat === activeCategory) {
                    btn.classList.add('bg-blue-100', 'text-blue-700', 'dark:bg-blue-600/20', 'dark:text-blue-400');
                    btn.classList.remove('text-slate-600', 'dark:text-slate-300', 'hover:bg-slate-100', 'dark:hover:bg-slate-800');
                } else {
                    btn.classList.remove('bg-blue-100', 'text-blue-700', 'dark:bg-blue-600/20', 'dark:text-blue-400');
                    btn.classList.add('text-slate-600', 'dark:text-slate-300', 'hover:bg-slate-100', 'dark:hover:bg-slate-800');
                }
            });
        }

        // --- FAVORİ SİSTEMİ ---
        function toggleFavorite(id) {
            if(favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('mugolFavorites', JSON.stringify(favorites));
            updateMainFavoriteButton();
            renderChannels(); 
        }

        function toggleCurrentFavorite() {
            if(currentChannelId) toggleFavorite(currentChannelId);
        }

        function updateMainFavoriteButton() {
            const isFav = favorites.includes(currentChannelId);
            const favIcon = document.getElementById('main-fav-icon');
            const favText = document.getElementById('main-fav-text');
            if(isFav) {
                favIcon.innerHTML = "⭐"; favIcon.classList.add("text-yellow-500"); favText.textContent = "Favoriden Çıkar";
            } else {
                favIcon.innerHTML = "☆"; favIcon.classList.remove("text-yellow-500"); favText.textContent = "Favoriye Ekle";
            }
        }

        // --- KANAL LİSTELEME ---
        function getFallbackImage(name) { return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=3b82f6&color=fff&rounded=true&bold=true`; }

        function renderChannels() {
            const listEl = document.getElementById('channel-list');
            listEl.innerHTML = "";
            let filtered = channels.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase()));
            if (activeCategory === 'Favoriler') filtered = filtered.filter(c => favorites.includes(c.id));
            else if (activeCategory !== 'Tümü') filtered = filtered.filter(c => c.category === activeCategory);

            if(filtered.length === 0) {
                listEl.innerHTML = `<div class="text-center mt-8 text-slate-500 font-bold"><span class="text-4xl mb-2 opacity-50">📡</span><p>Kanal bulunamadı.</p></div>`;
                return;
            }

            filtered.forEach(channel => {
                const isFav = favorites.includes(channel.id);
                const isActive = currentChannelId === channel.id;
                
                const wrapper = document.createElement('div');
                wrapper.className = `w-full flex items-center justify-between p-2 rounded-xl border border-transparent hover:bg-slate-200 dark:hover:bg-slate-800 transition-all mb-1.5 bg-white dark:bg-slate-900/50 shadow-sm sm:shadow-none group cursor-pointer ${isActive ? 'active-channel' : ''}`;
                
                let logoSrc = channel.logo || getFallbackImage(channel.name);

                wrapper.innerHTML = `
                    <div class="flex-1 flex items-center gap-3 min-w-0" onclick="playChannel('${channel.id}', true)">
                        <div class="w-12 h-12 bg-slate-100 dark:bg-white rounded-lg flex items-center justify-center p-1.5 shadow-sm shrink-0">
                            <img src="${logoSrc}" alt="${channel.name}" class="max-w-full max-h-full object-contain" onerror="this.onerror=null; this.src='${getFallbackImage(channel.name)}';">
                        </div>
                        <div class="flex-1 min-w-0 pr-2">
                            <div class="font-extrabold text-slate-800 dark:text-slate-200 truncate group-hover:text-blue-600 dark:group-hover:text-white transition">${channel.name}</div>
                            <div class="text-xs font-bold text-blue-500 dark:text-blue-400 mt-0.5 uppercase tracking-wide truncate">${channel.category}</div>
                        </div>
                    </div>
                    
                    <button class="p-3 text-xl shrink-0 transition focus:outline-none z-10 hover:scale-110" onclick="event.stopPropagation(); toggleFavorite('${channel.id}')" title="Favoriye Ekle">
                        ${isFav ? '<span class="text-yellow-500">⭐</span>' : '<span class="text-slate-300 dark:text-slate-600 hover:text-slate-400">☆</span>'}
                    </button>
                `;
                listEl.appendChild(wrapper);
            });
        }

        document.getElementById('search').addEventListener('input', (e) => { searchQuery = e.target.value; renderChannels(); });

        // --- VİDEO YAYINI VE HATA YÖNETİMİ ---
        function playChannel(id, scrollUp = false) {
            const channel = channels.find(c => c.id === id);
            if(!channel) return;

            currentChannelId = id;
            renderChannels(); 
            
            document.getElementById('current-channel-name').textContent = channel.name;
            document.getElementById('current-channel-desc').textContent = `${channel.category} | Canlı Yayın`;
            document.getElementById('live-dot').classList.remove('hidden');
            
            const logoEl = document.getElementById('current-logo');
            logoEl.onerror = function() { this.onerror = null; this.src = getFallbackImage(channel.name); };
            logoEl.src = channel.logo || getFallbackImage(channel.name);
            
            updateMainFavoriteButton();
            showStatus("Yayın Bağlanıyor...", true);

            if(scrollUp && window.innerWidth < 1024) window.scrollTo({ top: 0, behavior: 'smooth' });
            
            if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls({ maxBufferLength: 30, liveSyncDurationCount: 3 });
                hls.loadSource(channel.stream);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    hideStatus();
                    video.play().catch(() => console.log("Oynatma reddedildi, ekrana dokunun."));
                });
                
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        document.getElementById('live-dot').classList.add('hidden');
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            showStatus("Bu kanalın canlı yayını tarayıcı dışı izlenmelere (CORS) kapalıdır.", false, channel.site);
                        } else {
                            showStatus("Yayın bağlantısı kurulamadı veya koptu.", false, channel.site);
                            hls.destroy();
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.stream;
                video.addEventListener('loadedmetadata', function () { hideStatus(); video.play(); });
                video.addEventListener('error', function() {
                    document.getElementById('live-dot').classList.add('hidden');
                    showStatus("Cihazınız bu yayını oynatamıyor veya yayın kapalı.", false, channel.site);
                });
            }
        }

        function showStatus(msg, spinnerActive, officialUrl = null) {
            const overlay = document.getElementById('status-overlay');
            const btn = document.getElementById('status-action-btn');
            
            overlay.classList.remove('hidden');
            document.getElementById('status-text').textContent = msg;
            document.getElementById('spinner').style.display = spinnerActive ? 'block' : 'none';

            if(officialUrl) {
                btn.href = officialUrl;
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        }

        function hideStatus() { document.getElementById('status-overlay').classList.add('hidden'); }

        // --- PiP ---
        document.getElementById('pip-btn').addEventListener('click', async () => {
            if (document.pictureInPictureElement) await document.exitPictureInPicture();
            else if (document.pictureInPictureEnabled && video.readyState !== 0) await video.requestPictureInPicture();
            else alert("Tarayıcınız PiP modunu desteklemiyor.");
        });

        // --- BAŞLAT ---
        initCategories();
        if(channels.length > 0) playChannel(channels[0].id);
    </script>
</body>
</html>
