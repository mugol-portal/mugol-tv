<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">

    <title>MuGöl TV - Premium Web TV</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { 
                    fontFamily: { sans:['Nunito', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' },
                        dark: { 900: '#0B0F19', 800: '#111827', 700: '#1F2937' }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                        'pop-in': 'popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)',
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        popIn: { '0%': { transform: 'scale(0.9)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
                        pulseGlow: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '.6' } }
                    }
                }
            }
        }
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1880946354382681" crossorigin="anonymous"></script>

    <!-- HLS.js Player -->

    <style>
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #374151; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #4b5563; }

        body { -webkit-tap-highlight-color: transparent; text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
        :root { --logo-bg: #f9fafb; }
        .dark { --logo-bg: #0B0F19; }

        .glass-header { background: rgba(255, 255, 255, 0.95); border-bottom: 1px solid rgba(229, 231, 235, 0.5); }
        .dark .glass-header { background: rgba(11, 15, 25, 0.95); border-bottom: 1px solid rgba(31, 41, 55, 0.5); }
        
        @supports (backdrop-filter: blur(8px)) {
            .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
            .dark .glass-header { background: rgba(11, 15, 25, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        }

        .active-channel { 
            background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(99,102,241,0.08)) !important; 
            border-color: rgba(59,130,246,0.5) !important; 
            box-shadow: inset 3px 0 0 0 #3b82f6, 0 2px 8px rgba(59,130,246,0.1);
        }
        .dark .active-channel { 
            background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(99,102,241,0.1)) !important; 
            border-color: rgba(59,130,246,0.5) !important; 
        }

        #video-container:-webkit-full-screen { width: 100vw; height: 100vh; border-radius: 0; }
        #video-container:-moz-full-screen { width: 100vw; height: 100vh; border-radius: 0; }
        #video-container:fullscreen { width: 100vw; height: 100vh; border-radius: 0; }
        
        input[type=range] { accent-color: #3b82f6; height: 6px; border-radius: 4px; outline: none; }

        @keyframes eq { 0%, 100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } }
        .eq-bar { width: 3px; height: 12px; background-color: currentColor; border-radius: 2px; transform-origin: bottom; will-change: transform; }
        .playing .eq-bar { animation: eq 0.8s ease-in-out infinite; }
        .playing .eq-bar:nth-child(2) { animation-delay: 0.2s; }
        .playing .eq-bar:nth-child(3) { animation-delay: 0.4s; }

        .modal-open { display: flex !important; animation: fadeIn 0.2s ease-out; }
        .modal-content-open { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .channel-card { 
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease; 
            border: 1px solid transparent; 
            will-change: transform; 
        }
        .channel-card:hover { 
            transform: translateY(-1px); 
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .dark .channel-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        /* Gradient video container glow */
        #video-container.playing {
            box-shadow: 0 0 0 1px rgba(59,130,246,0.2), 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* Şık info bar */
        .channel-info-gradient {
            background: linear-gradient(135deg, #ffffff 0%, #f8faff 100%) !important;
        }
        .dark .channel-info-gradient {
            background: linear-gradient(135deg, #1F2937 0%, #111827 100%) !important;
        }

        /* Sidebar gradient bottom */
        #sidebar::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 80px;
            background: linear-gradient(to top, white, transparent);
            pointer-events: none;
            border-radius: 0 0 0 0;
        }
        .dark #sidebar::after {
            background: linear-gradient(to top, #0B0F19, transparent);
        }

        /* Logo placeholder */
        .logo-placeholder {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; font-size: 1rem;
        }

        /* Pulse animation for live badge */
        @keyframes livePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
        }
        #live-dot:not(.hidden) { animation: livePulse 2s ease-in-out infinite; }

        /* Smooth sidebar */
        #sidebar { position: fixed; }
        @media (min-width: 1024px) { #sidebar { position: static; } }

        /* Toast iyileştirme */
        #toast-container > div { pointer-events: auto; }
    </style>
</head>

        function showToast(message, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icon = type === 'success' ? '✅' : (type === 'error' ? '❌' : 'ℹ️');
            const bgStyle = type === 'success' ? 'background:#16a34a' : (type === 'error' ? 'background:#dc2626' : 'background:#1f2937');
            
            toast.className = `px-5 py-3.5 rounded-2xl shadow-xl font-bold text-sm text-white flex items-center gap-3 animate-slide-up`;
            toast.setAttribute('style', bgStyle);
            toast.innerHTML = `<span class="text-lg">${icon}</span> ${message}`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

                            ${cat}
                        </div>
                        <span class="text-[10px] font-black bg-gray-200/50 dark:bg-dark-800 px-2 py-0.5 rounded-lg text-gray-500">${count}</span>
                    </button>`;
                catList.appendChild(li);
            });
        }

        function filterCategory(cat) {
            activeCategory = cat;
            document.getElementById('list-info-text').textContent = cat === 'Tümü' ? 'Tüm Kanallar' : (cat === 'Favoriler' ? 'Favorilerim' : cat + ' Kategorisi');
            
            document.querySelectorAll('.cat-btn').forEach(btn => {
                if(btn.dataset.cat === activeCategory) {
                    btn.classList.add('bg-brand-50', 'text-brand-600', 'dark:bg-dark-800', 'dark:text-brand-400');
                    btn.classList.remove('text-gray-600', 'dark:text-gray-400', 'hover:bg-gray-100');
                } else {
                    btn.classList.remove('bg-brand-50', 'text-brand-600', 'dark:bg-dark-800', 'dark:text-brand-400');
                    btn.classList.add('text-gray-600', 'dark:text-gray-400', 'hover:bg-gray-100');
                }
            });
            
            renderChannels(); 
            if(window.innerWidth < 1024 && !document.getElementById('sidebar').classList.contains('-translate-x-full')) toggleMobileSidebar();
        }

        function toggleFavorite(id, event) {
            if(event) event.stopPropagation();
            if(favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
                showToast("Favorilerden çıkarıldı");
            } else {
                favorites.push(id);
                showToast("Favorilere eklendi", "success");
            }
            localStorage.setItem('mugolFavorites', JSON.stringify(favorites));
            document.getElementById('fav-count').textContent = favorites.length;
            updateMainFavoriteButton();
            renderChannels(); 
        }

        function toggleCurrentFavorite() { if(currentChannelId) toggleFavorite(currentChannelId); }

        function updateMainFavoriteButton() {
            const isFav = favorites.includes(currentChannelId);
            const favIcon = document.getElementById('main-fav-icon');
            const btn = document.getElementById('main-fav-btn');
            if(isFav) {
                favIcon.innerHTML = "⭐"; btn.classList.add("text-yellow-600", "dark:text-yellow-500");
                document.getElementById('main-fav-text').textContent = "Favorilerde";
            } else {
                favIcon.innerHTML = "☆"; btn.classList.remove("text-yellow-600", "dark:text-yellow-500");
                document.getElementById('main-fav-text').textContent = "Favoriye Ekle";
            }
        }

        function addToRecents(id) {
            recentChannels = recentChannels.filter(c => c !== id); 
            recentChannels.unshift(id); 
            if(recentChannels.length > 8) recentChannels.pop(); 
            localStorage.setItem('mugolRecents', JSON.stringify(recentChannels));
            renderRecents();
        }

        function renderRecents() {
            const wrapper = document.getElementById('recent-channels-wrapper');
            const container = document.getElementById('recent-channels');
            if(recentChannels.length === 0) { wrapper.classList.add('hidden'); return; }
            wrapper.classList.remove('hidden');
            container.innerHTML = '';
            
            recentChannels.forEach(id => {
                const channel = channels.find(c => c.id === id);
                if(!channel) return;
                const el = document.createElement('div');
                el.className = "flex-shrink-0 cursor-pointer group w-[70px] text-center";
                el.onclick = () => playChannel(channel.id);
                el.innerHTML = `
                    <div class="w-14 h-14 mx-auto rounded-[14px] p-[2px] recent-card-border group-hover:from-brand-400 group-hover:to-brand-600 transition-all duration-300 mb-1.5 shadow-sm group-hover:shadow-md group-hover:scale-105" style="background: linear-gradient(135deg, #e5e7eb, #d1d5db)">
                        <div class="w-full h-full rounded-[11px] flex items-center justify-center p-1.5 overflow-hidden bg-white dark:bg-[#0B0F19]">
                            <img src="${channel.logo || 'Logo.png'}" class="max-w-full max-h-full object-contain transform group-hover:scale-110 transition-transform" onerror="this.onerror=null; this.src='Logo.png'">
                        </div>
                    </div>
                    <span class="text-[10px] font-bold text-gray-600 dark:text-gray-400 truncate block w-full group-hover:text-brand-500">${channel.name}</span>
                `;
                container.appendChild(el);
            });
        }

        function renderChannels() {
            const listEl = document.getElementById('channel-list');
            listEl.innerHTML = "";
            let filtered = channels.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase()) || c.category.toLowerCase().includes(searchQuery.toLowerCase()));
            if (activeCategory === 'Favoriler') filtered = filtered.filter(c => favorites.includes(c.id));
            else if (activeCategory !== 'Tümü') filtered = filtered.filter(c => c.category === activeCategory);

            const badge = document.getElementById('channel-count-badge');
            if(badge) badge.textContent = filtered.length + ' kanal';

            if(filtered.length === 0) {
                listEl.innerHTML = `<div class="text-center mt-10 text-gray-400 font-bold flex flex-col items-center animate-fade-in"><svg class="w-10 h-10 mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><p>Sonuç bulunamadı.</p></div>`;
                return;
            }

            filtered.forEach(channel => {
                const isFav = favorites.includes(channel.id);
                const isActive = currentChannelId === channel.id;
                
                const wrapper = document.createElement('div');
                wrapper.className = `channel-card relative flex items-center justify-between p-2 rounded-[14px] mb-1.5 cursor-pointer bg-white dark:bg-dark-800 shadow-sm ${isActive ? 'active-channel' : ''}`;
                wrapper.onclick = () => playChannel(channel.id, true);
                
                const logoHtml = channel.logo 
                    ? `<img src="${channel.logo}" class="max-w-full max-h-full object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                       <div class="logo-placeholder w-full h-full rounded-lg absolute inset-0" style="display:none">${channel.name.charAt(0)}</div>`
                    : `<div class="logo-placeholder w-full h-full rounded-lg">${channel.name.charAt(0)}</div>`;

                wrapper.innerHTML = `
                    <div class="flex-1 flex items-center gap-3 min-w-0 pr-8">
                        <div class="relative w-11 h-11 rounded-xl flex items-center justify-center p-1 shrink-0 overflow-hidden border border-gray-100 dark:border-gray-700/40" style="background: var(--logo-bg, #f9fafb)">
                            ${logoHtml}
                        </div>
                        <div class="flex-1 min-w-0 text-left">
                            <div class="font-bold text-sm text-gray-800 dark:text-gray-200 truncate ${isActive ? 'text-brand-600 dark:text-brand-400' : ''}">${channel.name}</div>
                            <div class="text-[10px] font-semibold text-gray-400 dark:text-gray-500 truncate uppercase tracking-wider mt-0.5">${channel.category}</div>
                        </div>
                    </div>
                    <button class="absolute right-2 top-1/2 -translate-y-1/2 p-2 text-lg shrink-0 transition-all hover:scale-125 focus:outline-none z-10 rounded-xl hover:bg-yellow-50 dark:hover:bg-yellow-500/10" onclick="toggleFavorite('${channel.id}', event)" title="Favori">
                        ${isFav ? '<span class="text-yellow-500 drop-shadow-md">⭐</span>' : '<span class="text-gray-300 dark:text-gray-600 hover:text-yellow-400">☆</span>'}
                    </button>
                `;
                listEl.appendChild(wrapper);
            });
        }

        document.getElementById('search').addEventListener('input', (e) => { 
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchQuery = e.target.value; 
                renderChannels(); 
            }, 300); 
        });

        // "CROXY / CORS" UYARISI VE ÖZEL YAYIN
        function playCustomStream() {
            const url = document.getElementById('custom-stream-url').value.trim();
            if(!url) return showToast("Lütfen geçerli bir m3u8 linki girin", "error");
            
            // CroxyProxy gibi sayfa tabanlı proxyler m3u8 oynatıcısında çalışmaz.
            if(url.toLowerCase().includes("croxyproxy") || url.toLowerCase().includes("proxysite")) {
                return showToast("Web proxy linkleri (Croxy vs.) desteklenmez! Lütfen doğrudan m3u8 linki girin.", "error");
            }
            
            const customId = "custom_" + Date.now();
            const customCh = { id: customId, name: "Özel Yayın", category: "Özel", logo: "Logo.png", stream: url };
            
            channels.unshift(customCh); 
            closeToolsModal();
            playChannel(customId);
            showToast("Özel yayın başlatılıyor...", "success");
        }

        // IFRAME FALLBACK
        function handleCorsError(channel) {
            const overlay = document.getElementById('status-overlay');
            const officialUrl = channel.site || `https://www.google.com/search?q=${encodeURIComponent(channel.name)}+canli+izle`;
            document.getElementById('video-container').classList.remove('playing');
            video.style.display = 'none'; 

            overlay.className = "absolute inset-0 z-20 bg-dark-900 flex flex-col transition-all overflow-hidden";
            overlay.innerHTML = `
                <div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center z-0 pointer-events-none">
                    <img src="Logo.png" class="h-12 mb-4 opacity-20" onerror="this.style.display='none'">
                    <h3 class="text-lg font-black text-white mb-2 tracking-wide">YAYIN KORUMASI DEVREDE</h3>
                    <p class="text-xs text-gray-400 font-bold max-w-sm">Bu kanal doğrudan oynatılamıyor. Eğer video yüklenmezse sağ üstteki butondan resmi siteye gidebilirsiniz.</p>
                </div>
                
                <iframe src="${officialUrl}" allowfullscreen="true" allow="autoplay; fullscreen; encrypted-media"
                        class="absolute inset-0 w-full h-full z-10 border-none opacity-95" sandbox="allow-scripts allow-same-origin allow-presentation allow-forms allow-popups">
                </iframe>
                
                <div class="absolute top-4 right-4 flex gap-2 z-30">
                    <button onclick="toggleFullscreen()" class="p-2.5 bg-black/80 backdrop-blur text-white rounded-xl hover:bg-brand-600 transition-colors shadow-lg" title="Tam Ekran">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    </button>
                    <a href="${officialUrl}" target="_blank" class="flex items-center gap-1.5 bg-brand-600/90 backdrop-blur text-white px-3 py-2 rounded-xl text-xs font-black hover:bg-brand-500 transition-colors shadow-lg">
                        Sekmede Aç <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                    </a>
                </div>
            `;
            overlay.classList.remove('hidden');
        }

        // Proxy URL oluşturucu
        function getProxyUrl(url, idx) {
            if (idx === undefined || idx === null) idx = 0;
            const fn = PROXY_LIST[idx % PROXY_LIST.length];
            return fn(url);
        }

        // VİDEO YAYINI (CORS/CROXY BYPASS ÖZELLİĞİ İLE)
        function playChannel(id, scrollUp = false, retryWithProxy = false, proxyIdx = 0) {
            const channel = channels.find(c => c.id === id);
            if(!channel) return;

            // Proxy durumunu kontrol et
            const useProxy = (corsProxyMode === 'force') || (corsProxyMode === 'auto' && retryWithProxy);

            if(!retryWithProxy) {
                currentChannelId = id;
                if(id && !id.startsWith('custom_')) addToRecents(id);
                renderChannels(); 
                
                document.title = `${channel.name} - MuGöl TV`;
                document.getElementById('current-channel-name').textContent = channel.name;
                document.getElementById('current-channel-desc').textContent = `${channel.category} Kategorisi`;
                document.getElementById('live-dot').classList.remove('hidden');
                document.getElementById('resolution-badge').classList.add('hidden');
                document.getElementById('proxy-badge').classList.add('hidden');
                document.getElementById('video-container').classList.remove('playing');
                video.style.display = 'block'; 
                
                const logoEl = document.getElementById('current-logo');
                logoEl.onerror = function() { this.onerror = null; this.src = 'Logo.png'; };
                logoEl.src = channel.logo || 'Logo.png';
                
                document.getElementById('quality-selector').classList.add('hidden');
                updateMainFavoriteButton();
            }

            const overlay = document.getElementById('status-overlay');
            overlay.className = "absolute inset-0 z-20 flex flex-col items-center justify-center bg-[#080B13]/95 transition-opacity duration-300";
            
            const officialUrl = channel.site || `https://www.google.com/search?q=${encodeURIComponent(channel.name)}+canli+izle`;
            overlay.innerHTML = `
                <div class="flex flex-col items-center animate-fade-in">
                    <img src="Logo.png" class="h-14 mb-5 animate-pulse-glow" onerror="this.style.display='none'">
                    <div class="w-6 h-6 border-4 border-dark-700 border-t-brand-500 rounded-full animate-spin mb-3"></div>
                    <div class="text-[10px] font-black text-brand-400 tracking-widest uppercase">
                        YAYIN BAĞLANIYOR...
                    </div>
                </div>
                <a href="${officialUrl}" target="_blank"
                   class="absolute bottom-5 left-1/2 -translate-x-1/2 flex items-center gap-2 bg-white/10 hover:bg-white/20 backdrop-blur text-white/80 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition-all border border-white/10 hover:border-white/20 shadow-lg">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                    Resmi Siteye Git
                </a>
            `;
            overlay.classList.remove('hidden');

            if(scrollUp && window.innerWidth < 1024) document.getElementById('main-area').scrollTo({ top: 0, behavior: 'smooth' });
            
            if (Hls.isSupported()) {
                if (hls) { hls.destroy(); if(video.src) { URL.revokeObjectURL(video.src); video.src = ''; } }
                
                hls = new Hls({ 
                    maxBufferLength: 30, 
                    liveSyncDurationCount: 3, 
                    enableWorker: true,
                    // CORS Bypass (Multi-Proxy) Entegrasyonu
                    xhrSetup: function(xhr, url) {
                        if (useProxy) {
                            const proxyUrl = getProxyUrl(url, proxyIdx);
                            xhr.open('GET', proxyUrl, true);
                        }
                    }
                });

                hls.loadSource(channel.stream);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                    overlay.classList.add('hidden');
                    if (useProxy) {
                        const badge = document.getElementById('proxy-badge');
                        badge.textContent = `🛡️ PROXY #${proxyIdx + 1}`;
                        badge.classList.remove('hidden');
                    }
                    
                    video.play().then(() => document.getElementById('video-container').classList.add('playing')).catch(() => console.log("Otomatik oynatma engeli."));
                    
                    const qualitySelector = document.getElementById('quality-selector');
                    qualitySelector.innerHTML = '<option value="-1">⚙️ Otomatik Çözünürlük</option>';
                    if(data.levels && data.levels.length > 1) {
                        data.levels.forEach((level, index) => {
                            const option = document.createElement('option');
                            option.value = index; option.textContent = `${level.height}p`;
                            qualitySelector.appendChild(option);
                        });
                        qualitySelector.classList.remove('hidden');
                    }
                });

                hls.on(Hls.Events.LEVEL_SWITCHED, function (event, data) {
                    const level = hls.levels[data.level];
                    const resBadge = document.getElementById('resolution-badge');
                    if(level && level.height) {
                        resBadge.textContent = level.height >= 720 ? 'HD' : 'SD';
                        resBadge.classList.remove('hidden');
                    }
                });
                
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        document.getElementById('live-dot').classList.add('hidden');
                        document.getElementById('video-container').classList.remove('playing');
                        
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            hls.destroy();
                            if (corsProxyMode === 'auto' && !retryWithProxy) {
                                // İlk proxy denemesi
                                console.warn("Ağ/CORS engeli algılandı. Proxy #0 deneniyor...");
                                showToast("Bağlantı engeli aşılıyor... 🛡️", "info");
                                setTimeout(() => playChannel(id, false, true, 0), 500);
                            } else if (corsProxyMode === 'auto' && retryWithProxy && proxyIdx < PROXY_LIST.length - 1) {
                                // Sonraki proxy'yi dene
                                const nextIdx = proxyIdx + 1;
                                console.warn(`Proxy #${proxyIdx} başarısız. Proxy #${nextIdx} deneniyor...`);
                                showToast(`Alternatif proxy deneniyor (${nextIdx + 1}/${PROXY_LIST.length})...`, "info");
                                setTimeout(() => playChannel(id, false, true, nextIdx), 800);
                            } else {
                                // Tüm proxy'ler başarısız → iframe'e düş
                                console.warn("Tüm proxy'ler başarısız, iframe fallback.");
                                handleCorsError(channel);
                            }
                        } else {
                            overlay.innerHTML = `<div class="text-white text-sm font-bold bg-red-600 px-5 py-3 rounded-xl shadow-lg">Bağlantı koptu. Yeniden deneniyor...</div>`;
                            overlay.classList.remove('hidden');
                            hls.recoverMediaError(); 
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Apple cihazlar için (Safari HLS) - multi-proxy desteği
                video.src = useProxy ? getProxyUrl(channel.stream, proxyIdx) : channel.stream;
                
                video.addEventListener('loadedmetadata', function () { 
                    overlay.classList.add('hidden'); 
                    if (useProxy) {
                        const badge = document.getElementById('proxy-badge');
                        badge.textContent = `🛡️ PROXY #${proxyIdx + 1}`;
                        badge.classList.remove('hidden');
                    }
                    video.play(); 
                    document.getElementById('video-container').classList.add('playing');
                });

                video.addEventListener('error', function() {
                    document.getElementById('live-dot').classList.add('hidden');
                    document.getElementById('video-container').classList.remove('playing');
                    
                    if (corsProxyMode === 'auto' && !retryWithProxy) {
                        playChannel(id, false, true, 0);
                    } else if (corsProxyMode === 'auto' && retryWithProxy && proxyIdx < PROXY_LIST.length - 1) {
                        playChannel(id, false, true, proxyIdx + 1);
                    } else {
                        handleCorsError(channel);
                    }
                });
            }
        }

        video.addEventListener('pause', () => document.getElementById('video-container').classList.remove('playing'));
        video.addEventListener('playing', () => document.getElementById('video-container').classList.add('playing'));

        document.getElementById('quality-selector').addEventListener('change', (e) => {
            if(hls) hls.currentLevel = parseInt(e.target.value);
            showToast("Çözünürlük güncellendi", "success");
            closeToolsModal();
        });

        document.getElementById('cors-mode').addEventListener('change', (e) => {
            corsProxyMode = e.target.value;
            localStorage.setItem('mugolCorsProxy', corsProxyMode);
            const labels = { auto: 'Otomatik Proxy', force: 'Proxy Her Zaman Açık', off: 'Proxy Kapalı' };
            showToast(`${labels[corsProxyMode] || 'CORS ayarı'} aktif. Yayın yenileniyor...`, "success");
            closeToolsModal();
            if(currentChannelId) playChannel(currentChannelId);
        });

        document.getElementById('sleep-timer').addEventListener('change', (e) => {
            clearTimeout(sleepTimerId);
            const minutes = parseInt(e.target.value);
            if (minutes > 0) {
                showToast(`Zamanlayıcı ayarlandı: ${minutes} dk`, "success");
                sleepTimerId = setTimeout(() => {
                    video.pause();
                    document.getElementById('live-dot').classList.add('hidden');
                    const overlay = document.getElementById('status-overlay');
                    overlay.className = "absolute inset-0 z-20 bg-dark-900 flex flex-col items-center justify-center";
                    overlay.innerHTML = `<div class="text-white text-2xl font-black bg-dark-800 px-8 py-6 rounded-3xl flex flex-col items-center"><span class="text-5xl mb-3">🌙</span> Uyku Modu Aktif</div>`;
                    overlay.classList.remove('hidden');
                }, minutes * 60 * 1000);
            } else { showToast("Zamanlayıcı kapatıldı"); }
            closeToolsModal();
        });

        function toggleFullscreen() {
            const container = document.getElementById('video-container');
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (container.requestFullscreen) container.requestFullscreen();
                else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }
        document.getElementById('fullscreen-btn').addEventListener('click', () => { toggleFullscreen(); closeToolsModal(); });

        document.getElementById('pip-btn').addEventListener('click', async () => {
            if (document.pictureInPictureElement) await document.exitPictureInPicture();
            else if (document.pictureInPictureEnabled && video.readyState !== 0) {
                await video.requestPictureInPicture();
                showToast("Mini ekran aktif", "success");
            } else showToast("Bu özellik desteklenmiyor", "error");
            closeToolsModal();
        });

        initCategories();
        renderRecents();

        const urlParams = new URLSearchParams(window.location.search);
        const requestedChannel = urlParams.get('kanal');

        if(requestedChannel && channels.find(c => c.id === requestedChannel)) {
            playChannel(requestedChannel);
        } else if(channels.length > 0) {
            if(recentChannels.length > 0) playChannel(recentChannels[0]);
            else playChannel(channels[0].id);
        }
    </script>
</body>
</html>
