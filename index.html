<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuGöl TV - Premium Web TV</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { 
                    fontFamily: { sans:['Nunito', 'sans-serif'] },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                        'pop-in': 'popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
                        'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        popIn: { '0%': { transform: 'scale(0.95)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
                        pulseGlow: { '0%, 100%': { opacity: '1', transform: 'scale(1)' }, '50%': { opacity: '.8', transform: 'scale(1.05)' } }
                    }
                }
            }
        }
    </script>

    <!-- Google AdSense & AMP -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1880946354382681" crossorigin="anonymous"></script>
    <script async custom-element="amp-auto-ads" src="https://cdn.ampproject.org/v0/amp-auto-ads-0.1.js"></script>

    <!-- Nunito Font -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- HLS.js Player -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Premium Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .active-channel {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(147, 51, 234, 0.05) 100%) !important;
            border-left: 4px solid #3b82f6 !important;
            box-shadow: 0 4px 20px -5px rgba(59, 130, 246, 0.3) !important;
        }
        .dark .active-channel {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.25) 0%, rgba(147, 51, 234, 0.1) 100%) !important;
            border-left: 4px solid #60a5fa !important;
        }

        body { transition: background-color 0.4s ease, color 0.4s ease; }
        
        #video-container:-webkit-full-screen { width: 100%; height: 100%; border-radius: 0; border: none; ring: 0; }
        #video-container:-moz-full-screen { width: 100%; height: 100%; border-radius: 0; border: none; ring: 0; }
        #video-container:fullscreen { width: 100%; height: 100%; border-radius: 0; border: none; ring: 0; }
        #video-container:fullscreen video { height: 100%; width: 100%; }
        #video-container:fullscreen iframe { border-radius: 0 !important; }
        
        input[type=range] { 
            accent-color: #3b82f6; 
            height: 6px;
            border-radius: 8px;
            outline: none;
        }

        @keyframes eq {
            0% { height: 4px; }
            50% { height: 14px; }
            100% { height: 4px; }
        }
        .eq-bar { width: 3px; background-color: currentColor; border-radius: 2px; transition: height 0.1s; }
        .playing .eq-bar { animation: eq 1s ease-in-out infinite; }
        .playing .eq-bar:nth-child(2) { animation-delay: 0.2s; }
        .playing .eq-bar:nth-child(3) { animation-delay: 0.4s; }

        .modal-open { display: flex !important; animation: fadeIn 0.2s ease-out; }
        .modal-content-open { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

        /* Kanal listesi hover efekti için */
        .channel-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .channel-card:hover { transform: scale(1.02); z-index: 10; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-[#090f1a] dark:text-slate-200 h-[100dvh] flex flex-col overflow-hidden selection:bg-blue-500 selection:text-white">

                <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 4.22a1 1 0 011.415 0l.884.884a1 1 0 01-1.414 1.415l-.884-.884a1 1 0 010-1.415zM1 10a1 1 0 011-1h1a1 1 0 110 2H2a1 1 0 01-1-1zm15 0a1 1 0 011-1h1a1 1 0 110 2h-1a1 1 0 01-1-1zM4.22 15.78a1 1 0 010-1.415l.884-.884a1 1 0 011.414 1.415l-.884.884a1 1 0 01-1.415 0zM15.78 15.78a1 1 0 01-1.415 0l-.884-.884a1 1 0 111.414-1.415l.884.884a1 1 0 010 1.415zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM10 5a5 5 0 100 10 5 5 0 000-10z"></path></svg>

            </button>
        </div>
    </header>

    <div class="flex-1 relative flex overflow-hidden w-full">
        <!-- Sol Menü -->

        <aside id="left-drawer" class="absolute inset-y-0 left-0 w-64 glass-panel border-r border-slate-200 dark:border-slate-800/50 z-[60] transform -translate-x-full flex flex-col shadow-2xl transition-transform duration-300">

            <div class="p-4 flex-1 overflow-y-auto custom-scrollbar">

            <main class="w-full lg:w-auto lg:flex-1 p-2 sm:p-4 lg:p-6 lg:overflow-y-auto shrink-0 flex flex-col gap-4 custom-scrollbar" id="main-area">

                        <!-- Kanal Detay -->
                        <div class="flex items-center gap-4 w-full sm:w-auto min-w-0">

                                    <span id="resolution-badge" class="bg-blue-500/10 text-blue-600 dark:text-blue-400 px-2.5 py-1 rounded-lg text-[10px] sm:text-xs font-black border border-blue-500/20 hidden">HD</span>

                    <option value="30">30 Dk Sonra Kapat</option>
                    <option value="60">1 Saat Sonra Kapat</option>
                    <option value="120">2 Saat Sonra Kapat</option>
                </select>
            </div>

            <!-- Hızlı İşlem Grid -->
            <div class="grid grid-cols-2 gap-3 mt-1">
                <button id="pip-btn" class="group flex flex-col items-center justify-center gap-2 p-3 bg-slate-100/80 dark:bg-slate-800/80 hover:bg-blue-50 dark:hover:bg-slate-700 hover:text-blue-600 dark:hover:text-blue-400 rounded-2xl text-slate-700 dark:text-slate-300 font-bold transition-all border border-slate-200/50 dark:border-slate-700/50">
                    <svg class="w-6 h-6 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 3H3v18h18V3zM10 17H6v-4h4v4z"></path></svg>

        function showToast(message, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-5 py-3.5 rounded-2xl shadow-2xl font-bold text-sm text-white backdrop-blur-xl animate-slide-up flex items-center gap-3 ${type === 'success' ? 'bg-green-600/95 border border-green-500/50' : 'bg-slate-900/95 dark:bg-slate-800/95 border border-slate-700/50'}`;
            toast.innerHTML = type === 'success' ? `<span class="text-lg">✅</span> ${message}` : `<span class="text-lg">ℹ️</span> ${message}`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // --- FAVORİ SİSTEMİ ---
        function toggleFavorite(id) {
            if(favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
                showToast("Favorilerden çıkarıldı");
            } else {
                favorites.push(id);
                showToast("Favorilere eklendi", "success");
            }
            localStorage.setItem('mugolFavorites', JSON.stringify(favorites));
            document.getElementById('fav-count').textContent = favorites.length;
            updateMainFavoriteButton();
            renderChannels(); 
        }
        function toggleCurrentFavorite() { if(currentChannelId) toggleFavorite(currentChannelId); }

        function updateMainFavoriteButton() {
            const isFav = favorites.includes(currentChannelId);
            const favIcon = document.getElementById('main-fav-icon');
            const favText = document.getElementById('main-fav-text');
            if(isFav) {
                favIcon.innerHTML = "⭐"; favIcon.classList.add("text-yellow-500", "scale-110"); favText.textContent = "Favoriden Çıkar";
            } else {
                favIcon.innerHTML = "☆"; favIcon.classList.remove("text-yellow-500", "scale-110"); favText.textContent = "Favoriye Ekle";
            }
        }

        // --- SON İZLENENLER ---
        function addToRecents(id) {
            recentChannels = recentChannels.filter(c => c !== id); 
            recentChannels.unshift(id); 
            if(recentChannels.length > 10) recentChannels.pop(); 
            localStorage.setItem('mugolRecents', JSON.stringify(recentChannels));
            renderRecents();
        }

        function renderRecents() {
            const wrapper = document.getElementById('recent-channels-wrapper');
            const container = document.getElementById('recent-channels');
            if(recentChannels.length === 0) {
                wrapper.classList.add('hidden'); return;
            }
            wrapper.classList.remove('hidden');
            container.innerHTML = '';
            
            recentChannels.forEach(id => {
                const channel = channels.find(c => c.id === id);
                if(!channel) return;
                const logoSrc = channel.logo || getFallbackImage(channel.name);
                
                const el = document.createElement('div');
                el.className = "flex-shrink-0 flex flex-col items-center gap-1.5 cursor-pointer group w-[64px]";
                el.onclick = () => playChannel(channel.id);
                el.innerHTML = `

        // --- KANAL LİSTELEME ---
        function getFallbackImage(name) { return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=3b82f6&color=fff&rounded=true&bold=true`; }

        function renderChannels() {
            const listEl = document.getElementById('channel-list');
            listEl.innerHTML = "";
            let filtered = channels.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase()));
            if (activeCategory === 'Favoriler') filtered = filtered.filter(c => favorites.includes(c.id));
            else if (activeCategory !== 'Tümü') filtered = filtered.filter(c => c.category === activeCategory);

            if(filtered.length === 0) {
                listEl.innerHTML = `<div class="text-center mt-12 text-slate-500 font-bold flex flex-col items-center animate-fade-in"><div class="w-16 h-16 bg-slate-200/50 dark:bg-slate-800/50 rounded-2xl flex items-center justify-center text-3xl mb-4">📺</div><p>Aradığınız kanal bulunamadı.</p></div>`;

            filtered.forEach(channel => {

        // --- VİDEO YAYINI ---
        function playChannel(id, scrollUp = false) {
            const channel = channels.find(c => c.id === id);
            if(!channel) return;

            currentChannelId = id;
            addToRecents(id);
            renderChannels(); 
            
            document.title = `▶ ${channel.name} - MuGöl TV`;
            document.getElementById('current-channel-name').textContent = channel.name;
            document.getElementById('current-channel-desc').textContent = `${channel.category} Kategorisi`;
            document.getElementById('live-dot').classList.remove('hidden');
            document.getElementById('resolution-badge').classList.add('hidden');
            document.getElementById('video-container').classList.remove('playing');
            
            video.style.display = 'block'; // Video geri getir
            
            const logoEl = document.getElementById('current-logo');
            logoEl.onerror = function() { this.onerror = null; this.src = getFallbackImage(channel.name); };
            logoEl.src = channel.logo || getFallbackImage(channel.name);
            
            document.getElementById('quality-selector').classList.add('hidden');
            updateMainFavoriteButton();

            const overlay = document.getElementById('status-overlay');
            overlay.className = "absolute inset-0 z-20 hidden bg-slate-900/95 dark:bg-[#090f1a]/95 backdrop-blur-md transition-all flex flex-col items-center justify-center";
            overlay.innerHTML = `

                        <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-blue-500 animate-spin"></div>
                    </div>
                    <div class="text-lg font-black text-white tracking-[0.2em] bg-black/60 px-6 py-2.5 rounded-full backdrop-blur-md border border-white/10 shadow-2xl animate-pulse-glow">YÜKLENİYOR...</div>
                </div>
            `;
            overlay.classList.remove('hidden');

            if(scrollUp && window.innerWidth < 1024) window.scrollTo({ top: 0, behavior: 'smooth' });
            
            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy();
                    if(video.src) { URL.revokeObjectURL(video.src); video.src = ''; }
                }
                
                hls = new Hls({ maxBufferLength: 30, liveSyncDurationCount: 3, enableWorker: true });
                hls.loadSource(channel.stream);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                    overlay.classList.add('hidden');
                    video.play().then(() => {
                        document.getElementById('video-container').classList.add('playing');
                    }).catch(() => console.log("Otomatik oynatma kısıtlaması."));
                    
                    const qualitySelector = document.getElementById('quality-selector');
                    qualitySelector.innerHTML = '<option value="-1">⚙️ Otomatik Kalite</option>';
                    if(data.levels && data.levels.length > 1) {
                        data.levels.forEach((level, index) => {
                            const option = document.createElement('option');
                            option.value = index; option.textContent = `${level.height}p`;
                            qualitySelector.appendChild(option);
                        });
                        qualitySelector.classList.remove('hidden');
                    }
                });

                hls.on(Hls.Events.LEVEL_SWITCHED, function (event, data) {
                    const level = hls.levels[data.level];
                    const resBadge = document.getElementById('resolution-badge');
                    if(level && level.height) {
                        resBadge.textContent = level.height >= 720 ? 'HD' : 'SD';
                        if(level.height >= 720) {
                            resBadge.className = "bg-blue-500/10 text-blue-600 dark:text-blue-400 px-2.5 py-1 rounded-lg text-[10px] sm:text-xs font-black border border-blue-500/20";
                        } else {
                            resBadge.className = "bg-slate-500/10 text-slate-600 dark:text-slate-400 px-2.5 py-1 rounded-lg text-[10px] sm:text-xs font-black border border-slate-500/20";
                        }
                        resBadge.classList.remove('hidden');
                    }
                });
                
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        document.getElementById('live-dot').classList.add('hidden');
                        document.getElementById('video-container').classList.remove('playing');
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            handleCorsError(channel);
                        } else {
                            overlay.innerHTML = `<div class="text-white text-xl font-bold bg-red-600/90 px-6 py-3 rounded-2xl backdrop-blur-md shadow-2xl animate-pop-in">Yayın Hatası. Yeniden deneniyor...</div>`;
                            overlay.classList.remove('hidden');
                            hls.recoverMediaError(); 
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.stream;
                video.addEventListener('loadedmetadata', function () { 
                    overlay.classList.add('hidden'); 
                    video.play(); 
                    document.getElementById('video-container').classList.add('playing');
                });
                video.addEventListener('error', function() {
                    document.getElementById('live-dot').classList.add('hidden');
                    document.getElementById('video-container').classList.remove('playing');
                    handleCorsError(channel);
                });
            }
        }

        video.addEventListener('pause', () => document.getElementById('video-container').classList.remove('playing'));
        video.addEventListener('playing', () => document.getElementById('video-container').classList.add('playing'));

        // --- ARAÇLAR İŞLEVLERİ (MODAL İÇİ) ---
        const volumeSlider = document.getElementById('volume-slider');
        const muteBtn = document.getElementById('mute-btn');
        let lastVolume = 1;

        video.addEventListener('volumechange', () => {
            volumeSlider.value = video.volume;
            if(video.muted || video.volume === 0) muteBtn.innerHTML = `<svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>`;
            else muteBtn.innerHTML = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>`;
        });

        volumeSlider.addEventListener('input', (e) => {
            video.volume = e.target.value;
            video.muted = false;
        });

        muteBtn.addEventListener('click', () => {
            if(video.muted || video.volume === 0) {
                video.muted = false;
                video.volume = lastVolume > 0.1 ? lastVolume : 1;
            } else {
                lastVolume = video.volume;
                video.muted = true;
                video.volume = 0;
            }
        });

        document.getElementById('quality-selector').addEventListener('change', (e) => {
            if(hls) hls.currentLevel = parseInt(e.target.value);
            showToast("Kalite güncellendi");
            closeToolsModal();
        });

        document.getElementById('sleep-timer').addEventListener('change', (e) => {
            clearTimeout(sleepTimerId);
            const minutes = parseInt(e.target.value);
            if (minutes > 0) {
                showToast(`Uyku modu ayarlandı: ${minutes} dk`);
                sleepTimerId = setTimeout(() => {
                    video.pause();
                    document.getElementById('live-dot').classList.add('hidden');
                    const overlay = document.getElementById('status-overlay');
                    overlay.className = "absolute inset-0 z-20 bg-slate-900/95 flex flex-col items-center justify-center backdrop-blur-md";
                    overlay.innerHTML = `<div class="text-white text-2xl font-bold bg-black/80 px-8 py-6 rounded-[2rem] shadow-2xl flex flex-col items-center animate-pop-in"><span class="text-5xl mb-4">🌙</span> Uyku Zamanlayıcısı süresi doldu.</div>`;
                    overlay.classList.remove('hidden');
                }, minutes * 60 * 1000);
            } else { showToast("Uyku modu kapatıldı"); }
            closeToolsModal();
        });

        document.getElementById('theater-btn').addEventListener('click', () => {
            const layout = document.getElementById('layout-wrapper');
            const mainContent = document.getElementById('main-content-wrapper');
            if(layout.classList.contains('lg:flex-row')) {
                layout.classList.remove('lg:flex-row'); layout.classList.add('lg:flex-col');
                mainContent.classList.remove('max-w-5xl'); mainContent.classList.add('max-w-full');
                showToast("Sinema moduna geçildi");
            } else {
                layout.classList.add('lg:flex-row'); layout.classList.remove('lg:flex-col');
                mainContent.classList.add('max-w-5xl'); mainContent.classList.remove('max-w-full');
                showToast("Normal görünüme geçildi");
            }
            closeToolsModal();
        });

        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            toggleFullscreen();
            closeToolsModal();
        });

        // Tüm kapsayıcıyı tam ekran yapar (iframe de içinde büyür)
        function toggleFullscreen() {
            const container = document.getElementById('video-container');
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (container.requestFullscreen) container.requestFullscreen().catch(err => console.log(err));
                else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        document.getElementById('pip-btn').addEventListener('click', async () => {
            if (document.pictureInPictureElement) await document.exitPictureInPicture();
            else if (document.pictureInPictureEnabled && video.readyState !== 0) {
                await video.requestPictureInPicture();
                showToast("Mini oynatıcı başlatıldı");
            }
            else showToast("Tarayıcınız PiP modunu desteklemiyor.", "error");
            closeToolsModal();
        });

        // --- KLAVYE KISAYOLLARI ---
        function playNextChannel(direction = 1) {
            if(!currentChannelId) return;
            const currentIdx = channels.findIndex(c => c.id === currentChannelId);
            if(currentIdx === -1) return;
            let nextIdx = currentIdx + direction;
            if(nextIdx >= channels.length) nextIdx = 0;
            if(nextIdx < 0) nextIdx = channels.length - 1;
            playChannel(channels[nextIdx].id, true);
        }

        document.addEventListener('keydown', (e) => {
            if(document.activeElement.tagName === 'INPUT') return;
            if(e.key === 'ArrowUp') { e.preventDefault(); playNextChannel(-1); }
            if(e.key === 'ArrowDown') { e.preventDefault(); playNextChannel(1); }
            if(e.key === 'm' || e.key === 'M') { muteBtn.click(); }
            if(e.key === 'f' || e.key === 'F') { toggleFullscreen(); }
        });

        // --- BAŞLATMA ---
        initCategories();
        renderRecents();

        const urlParams = new URLSearchParams(window.location.search);
        const requestedChannel = urlParams.get('kanal');

        if(requestedChannel && channels.find(c => c.id === requestedChannel)) {
            playChannel(requestedChannel);
        } else if(channels.length > 0) {
            if(recentChannels.length > 0) playChannel(recentChannels[0]);
            else playChannel(channels[0].id);
        }
    </script>
</body>
</html>
